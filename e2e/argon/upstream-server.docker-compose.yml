---
x-upstream-server: &upstream-server
  restart: unless-stopped
  extra_hosts:
    - 'host.docker.internal:host-gateway'

services:
  upstream-miner:
    profiles:
      - upstream
    image: ghcr.io/argonprotocol/argon-miner:${VERSION:-dev}
    build:
      context: .
      dockerfile: dev.Dockerfile
      target: argon-node
    restart: on-failure
    depends_on:
      bitcoin:
        condition: service_healthy
      bitcoin-init:
        condition: service_completed_successfully
      archive-node:
        condition: service_healthy
    command: >
      --eve
      --compute-miners=1
      --port=30337
      --unsafe-force-node-key-generation
      --base-path=/data
      --bootnodes=/dns/archive-node/tcp/30334/p2p/12D3KooWMdmKGEuFPVvwSd92jCQJgX9aFCp45E8vV2X284HQjwnn
      --chain=${ARGON_CHAIN:-local}
      --bitcoin-rpc-url=http://bitcoin:bitcoin@bitcoin:18443
      --notebook-archive-hosts=http://minio:9000
      --no-mdns
      --network-backend=libp2p
      --no-telemetry
      --detailed-log-output
      --experimental-rpc-endpoint=listen-addr=0.0.0.0:9944,methods=unsafe
      --experimental-rpc-endpoint=listen-addr=0.0.0.0:9945,methods=safe,cors=all,rate-limit-trust-proxy-headers=true,max-connections=${ARGON_SAFE_RPC_MAX_CONNECTIONS:-200}
      --validator
      --pruning=archive
    environment:
      RUST_LOG: info,argon=info,pallet=trace
    healthcheck:
      test:
        - CMD-SHELL
        - >
          curl -fsS -H 'Content-Type: application/json' \
            -d '{"id":1,"jsonrpc":"2.0","method":"system_health","params":[]}' \
            http://127.0.0.1:9944 | jq -e '.result.peers > 0' > /dev/null || exit 1
      interval: 5s
      timeout: 3s
      start_period: 30s
      retries: 12
    ports:
      - '0:9944'
      - '0:9945'
      - '0:30337'

  upstream-router:
    <<: *upstream-server
    profiles:
      - upstream
    build:
      context: ../../server/router
      dockerfile: Dockerfile
    depends_on:
      archive-node:
        condition: service_healthy
      bitcoin:
        condition: service_healthy
      upstream-miner:
        condition: service_healthy
    env_file:
      - ${ARGON_DEV_UPSTREAM_ROOT_DIR:-../dev-upstream}/config/.env.state
    environment:
      - PORT=8080
      - ARGON_CHAIN=dev-docker
      - ARGON_LOCAL_NODE=ws://upstream-miner:9944
      - ARGON_ARCHIVE_NODE=ws://archive-node:9944
      - BOT_INTERNAL_URL=http://upstream-bot:8080
      - BITCOIN_RPC_URL=http://bitcoin:bitcoin@bitcoin:18443
      - BITCOIN_CHAIN=regtest
      - DATADIR=/data
    volumes:
      - ${ARGON_DEV_UPSTREAM_ROOT_DIR:-../dev-upstream}/data:/data
    ports:
      - '${UPSTREAM_ROUTER_PORT:-0}:8080'
    healthcheck:
      test:
        - CMD-SHELL
        - >
          curl -fsS http://127.0.0.1:8080/ | jq -e '.status == "ok"' > /dev/null || exit 1
      interval: 5s
      timeout: 3s
      start_period: 20s
      retries: 12

  upstream-bot:
    <<: *upstream-server
    profiles:
      - upstream
    build:
      context: ../../server/bot
      dockerfile: Dockerfile
    depends_on:
      archive-node:
        condition: service_healthy
      upstream-miner:
        condition: service_healthy
      upstream-router:
        condition: service_healthy
    env_file:
      - ${ARGON_DEV_UPSTREAM_ROOT_DIR:-../dev-upstream}/config/.env.state
    environment:
      - PORT=8080
      - ARGON_CHAIN=dev-docker
      - DATADIR=/data
      - ROUTER_URL=http://upstream-router:8080
      - ARCHIVE_NODE_URL=ws://archive-node:9944
      - LOCAL_RPC_URL=ws://upstream-miner:9944
      - BIDDING_RULES_PATH=/config/biddingRules.json
      - BIDDER_KEYPAIR_PATH=/config/walletMiningBot.json
      - VAULT_DELEGATE_KEYPAIR_PATH=/config/walletVaultDelegate.json
    volumes:
      - ${ARGON_DEV_UPSTREAM_ROOT_DIR:-../dev-upstream}/config:/config
      - ${ARGON_DEV_UPSTREAM_ROOT_DIR:-../dev-upstream}/data:/data
    ports:
      - '${UPSTREAM_BOT_PORT:-0}:8080'
    healthcheck:
      test:
        - CMD-SHELL
        - >
          curl -fsS http://127.0.0.1:8080/is-ready | grep -q true || exit 1
      interval: 5s
      timeout: 3s
      start_period: 20s
      retries: 20

  upstream-nginx:
    <<: *upstream-server
    profiles:
      - upstream
    build:
      context: ../../server/nginx
      dockerfile: Dockerfile
    depends_on:
      upstream-miner:
        condition: service_healthy
      upstream-bot:
        condition: service_healthy
      upstream-router:
        condition: service_healthy
    environment:
      - ROUTER_UPSTREAM_URL=http://upstream-router:8080
      - BOT_UPSTREAM_URL=http://upstream-bot:8080
      - SUBSTRATE_UPSTREAM_URL=http://upstream-miner:9945
      - SUBSTRATE_UPSTREAM_HOST_HEADER=localhost:9945
    volumes:
      - ../../config/nginx-certs:/etc/nginx/certs:ro
    ports:
      - '${UPSTREAM_GATEWAY_PORT:-0}:443'
    healthcheck:
      test:
        - CMD-SHELL
        - >
          curl -kfsS https://127.0.0.1/ | jq -e '.status == "ok"' > /dev/null || exit 1
      interval: 5s
      timeout: 3s
      start_period: 20s
      retries: 20
