---
name: Publish distributions

on:
  push:
    branches:
      - v[0-9]+.*
  workflow_dispatch:
    inputs:
      version:
        description: 'Tag to publish'
        required: true
        default: 'v0.0.0'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  VERSION: ${{ github.event.inputs.version || github.ref_name }}
  BUILDS: ${{ contains(github.event.inputs.version || github.ref_name, '-rc') && 'experimental-only' || 'all' }}
  RELEASE_NOTES: ''

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'
          - platform: 'windows-latest'
            args: ''
          - platform: 'ubuntu-22.04'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Free disk space (Ubuntu runner)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          set -euxo pipefail
          df -h
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*
          df -h

      - name: setup node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: 24
          cache: yarn

      - name: install Rust stable (macOS)
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537
        with:
          toolchain: stable

      - name: Ensure Rust macOS targets
        if: ${{ matrix.platform == 'macos-latest' }}
        run: |
          set -euxo pipefail
          rustup show active-toolchain
          rustup target list --installed || true
          rustup target add aarch64-apple-darwin x86_64-apple-darwin
          rustup target list --installed

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04' # This must match the platform value defined above.
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install dependencies (macOS only)
        if: matrix.platform == 'macos-latest'
        run: |
          brew install create-dmg

      - if: runner.os == 'Windows'
        shell: bash
        run: echo "AWS_LC_SYS_PREBUILT_NASM=1" >> "$GITHUB_ENV"

      - name: Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          workspaces: './src-tauri -> target'

      - name: install frontend dependencies
        run: yarn install

      - name: Read release notes (and ensure they exist)
        shell: bash
        run: |
          RELEASE_NOTES=$(yarn tsx scripts/getReleaseNotes.ts "$VERSION")
          if [ -z "$RELEASE_NOTES" ]; then
              echo "Release notes are empty. Please provide valid release notes."
              exit 1
          fi
          {
            echo 'RELEASE_NOTES<<__EOF__'
            echo "$RELEASE_NOTES"
            echo '__EOF__'
          } >> "$GITHUB_ENV"

      - name: build server
        run: yarn build:server

      - name: Prepare Apple notarization key
        if: ${{ matrix.platform == 'macos-latest' }}
        shell: bash
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PRIVATE: ${{ secrets.APPLE_API_KEY_PRIVATE }}
        run: |
          set -euo pipefail
          APPLE_API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY}.p8"
          printf '%s' "$APPLE_API_KEY_PRIVATE" > "$APPLE_API_KEY_PATH"
          chmod 600 "$APPLE_API_KEY_PATH"

      - name: Enable macOS release symbols
        if: ${{ matrix.platform == 'macos-latest' }}
        shell: bash
        run: |
          {
            echo 'CARGO_PROFILE_RELEASE_DEBUG=line-tables-only'
            echo 'CARGO_PROFILE_RELEASE_SPLIT_DEBUGINFO=packed'
          } >> "$GITHUB_ENV"

      - name: Build and Publish Operations Stable
        if: ${{ env.BUILDS == 'all' }}
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/AuthKey_${{ secrets.APPLE_API_KEY }}.p8
          ARGON_APP_ENABLE_AUTOUPDATE: true
          NODE_ENV: production
          NODE_OPTIONS: --max-old-space-size=6144
          RUST_BACKTRACE: full
        with:
          includeDebug: false
          includeRelease: true
          includeUpdaterJson: false
          tagName: ${{ env.VERSION }}
          releaseName: ${{ env.VERSION }}
          releaseBody: ${{ env.RELEASE_NOTES }}
          releaseDraft: true
          prerelease: true
          args: ${{ matrix.args }} --config ${{ github.workspace }}/src-tauri/tauri.operations.conf.json

      - name: Upload Operations Symbols
        if: ${{ env.BUILDS == 'all' }}
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/uploadReleaseSymbols.sh Argon.Operations

      - name: Build and Publish Treasury Stable
        if: ${{ env.BUILDS == 'all' }}
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/AuthKey_${{ secrets.APPLE_API_KEY }}.p8
          ARGON_APP_ENABLE_AUTOUPDATE: true
          NODE_ENV: production
          NODE_OPTIONS: --max-old-space-size=6144
          RUST_BACKTRACE: full
        with:
          includeDebug: false
          includeRelease: true
          includeUpdaterJson: false
          tagName: ${{ env.VERSION }}
          releaseName: ${{ env.VERSION }}
          releaseBody: ${{ env.RELEASE_NOTES }}
          releaseDraft: true
          prerelease: true
          args: ${{ matrix.args }} --config ${{ github.workspace }}/src-tauri/tauri.treasury.conf.json

      - name: Upload Treasury Symbols
        if: ${{ env.BUILDS == 'all' }}
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/uploadReleaseSymbols.sh Argon.Treasury

      - name: Upload server artifacts
        if: ${{ matrix.platform == 'macos-latest' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tar -czf server.tar.gz ./resources/*
          gh release upload ${{ env.VERSION }} server.tar.gz --clobber

  publish-update-channel:
    permissions:
      contents: write
    needs: publish-tauri
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: 24
          cache: yarn

      - name: install dependencies
        run: yarn install

      - name: Publish to channel release
        run: yarn tsx scripts/updateReleaseChannels.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          VERSION: ${{ env.VERSION }}
          RELEASE_NOTES: ${{ env.RELEASE_NOTES }}
