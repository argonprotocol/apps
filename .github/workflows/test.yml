name: Test
on:
  push:

permissions:
  contents: read

jobs:
  tests:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'ubuntu-latest'
          - platform: 'windows-latest'
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'yarn'

      - name: Install system dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            webkit2gtk-driver \
            xvfb

      # install latest stable Rust release
      - name: Setup rust-toolchain stable
        uses: dtolnay/rust-toolchain@stable

      # setup caching for the Rust target folder
      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - if: runner.os == 'Windows'
        shell: bash
        run: echo "AWS_LC_SYS_PREBUILT_NASM=1" >> "$GITHUB_ENV"

      - name: Install SQLite on Windows
        if: runner.os == 'Windows'
        run: choco install sqlite

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install

      - name: Build
        run: yarn build:indexer

      - name: Make docker.sock world-writable
        if: matrix.platform == 'ubuntu-latest'
        run: sudo chmod 666 /var/run/docker.sock

      # xvfb-run provides a virtual display required by WebKit/GTK in CI.
      - name: Tests (Linux)
        if: matrix.platform == 'ubuntu-latest'
        run: xvfb-run yarn test
        env:
          CI: true
          ARGON_E2E_HEADLESS: true

      - name: Tests (Windows)
        if: matrix.platform == 'windows-latest'
        run: yarn test
        env:
          CI: true
          ARGON_E2E_HEADLESS: true
          DISABLE_E2E_TEST: '1'

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts
          path: /tmp/troubleshooting-*
