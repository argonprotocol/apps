---
name: Public indexer docker image

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: argonprotocol/argon-indexer

jobs:
  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Install nodejs
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: 24
          cache: yarn

      - name: Read package json version
        run: |
          VERSION=$(node -p "require('./indexer/package.json').version")
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "SEED_DATE=$(date -u +%Y%m%d)" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Login to container registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: yarn install

      - name: Restore the previous checkpoint
        shell: bash
        run: |
          set -euo pipefail
          image="${REGISTRY}/${IMAGE_NAME}"
          source_tag=""
          if docker pull "${image}:hourly"; then
            source_tag="hourly"
          elif docker pull "${image}:${VERSION}"; then
            source_tag="${VERSION}"
          fi

          if [[ -z "${source_tag}" ]]; then
            echo "No previous image found; the seeds will replay from their existing checkout state."
            exit 0
          fi

          mkdir -p indexer/seeds
          container_id=$(docker create "${image}:${source_tag}")
          trap 'docker rm -f "${container_id}" >/dev/null 2>&1 || true' EXIT
          docker cp "${container_id}:/usr/src/app/seeds/mainnet-activity-v2.db.gz" indexer/seeds/ || true
          docker cp "${container_id}:/usr/src/app/seeds/testnet-activity-v2.db.gz" indexer/seeds/ || true
          if [[ -f indexer/seeds/mainnet-activity-v2.db.gz && -f indexer/seeds/testnet-activity-v2.db.gz ]]; then
            yarn workspace @argonprotocol/apps-indexer extract
            echo "Restored seeds from ${image}:${source_tag}"
          else
            echo "Previous image has no current seeds; indexing will replay from block 1."
          fi

      - name: Advance network seeds
        shell: bash
        env:
          SEED_SYNC_MAX_MINUTES: 285
        run: |
          set -euo pipefail

          yarn workspace @argonprotocol/apps-indexer sync mainnet &
          mainnet_pid=$!
          yarn workspace @argonprotocol/apps-indexer sync testnet &
          testnet_pid=$!

          status=0
          wait "$mainnet_pid" || status=1
          wait "$testnet_pid" || status=1
          exit "$status"

      - name: Checkpoint, verify, and compress seeds
        id: seeds
        shell: bash
        run: |
          yarn workspace @argonprotocol/apps-indexer manifest
          caught_up=$(node -p "Object.values(require('./indexer/seeds/seed-manifest.json').seeds).every(seed => seed.caughtUp)")
          echo "caught_up=${caught_up}" >> "$GITHUB_OUTPUT"

      - name: Build indexer project
        run: yarn build
        working-directory: indexer

      - name: Set up tags
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=hourly
            type=raw,value=seed-${{ env.SEED_DATE }},enable=${{ steps.seeds.outputs.caught_up == 'true' }}
            type=raw,value=${{ env.VERSION }},enable=${{ github.event_name == 'workflow_dispatch' && steps.seeds.outputs.caught_up == 'true' }}
            type=raw,value=latest,enable=${{ github.event_name == 'workflow_dispatch' && steps.seeds.outputs.caught_up == 'true' }}

      - name: Build and push image to container registry
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25
        id: push
        with:
          platforms: linux/amd64,linux/arm64
          context: indexer
          file: indexer/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Report immutable image identity
        run: |
          echo "Combined indexer image digest: ${{ steps.push.outputs.digest }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Caught up: ${{ steps.seeds.outputs.caught_up }}" >> "$GITHUB_STEP_SUMMARY"
          if [[ "${{ steps.seeds.outputs.caught_up }}" == "true" ]]; then
            echo "Daily tag: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:seed-${{ env.SEED_DATE }}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Published resumable progress to the hourly tag." >> "$GITHUB_STEP_SUMMARY"
          fi
